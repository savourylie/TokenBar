name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build and bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD=$(git rev-list --count HEAD)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD=$BUILD" >> "$GITHUB_ENV"
          scripts/bundle.sh "$VERSION" "$BUILD"

      - name: Archive
        run: |
          tar -czf "TokenBar-Beta.app.tar.gz" -C dist "TokenBar Beta.app"
          shasum -a 256 "TokenBar-Beta.app.tar.gz" | awk '{print $1}' > sha256.txt
          echo "SHA256=$(cat sha256.txt)" >> "$GITHUB_ENV"

      - name: Generate release notes
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
        run: |
          set -euo pipefail
          NOTES_FILE="release-notes.txt"

          # Deterministic baseline: grouped changelog for this tag.
          brew list git-cliff >/dev/null 2>&1 || brew install git-cliff
          CLIFF="$(git-cliff --config cliff.toml --current --strip all 2>/dev/null || true)"
          [[ -z "$CLIFF" ]] && CLIFF="$(git-cliff --config cliff.toml --latest --strip all 2>/dev/null || true)"
          printf '%s\n' "$CLIFF" > "$NOTES_FILE"

          # Polish into user-facing prose via DeepSeek; plain text only — the
          # same notes render in the Sparkle dialog and as HTML in the
          # appcast, so markdown syntax would leak through as raw characters.
          if [[ -n "${DEEPSEEK_API_KEY:-}" && -s "$NOTES_FILE" ]]; then
            MODEL="${DEEPSEEK_MODEL:-deepseek-v4-pro}"
            PREV="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
            if [[ -n "$PREV" ]]; then RANGE="${PREV}..${GITHUB_REF_NAME}"; else RANGE="${GITHUB_REF_NAME}"; fi
            COMMITS="$(git log --no-merges --pretty='- %s' "$RANGE" 2>/dev/null || true)"
            STAT="$(git diff --stat "$RANGE" 2>/dev/null | tail -1 || true)"
            PROMPT="$(printf 'Write concise, user-facing release notes for TokenBar %s, a native macOS menu-bar AI token-usage monitor. STRICT FORMAT RULES: plain text only — absolutely no markdown syntax (no #, no **, no _, no backticks, no links, no tables). Structure: group lines under plain headings that are exactly "New:" or "Fixes:" on their own line, each item on its own line starting with "- ". Nothing else. Be specific and factual — only describe changes present below, do not invent. Keep it tight.\n\nGrouped changelog:\n%s\n\nCommits:\n%s\n\nDiff summary: %s\n' "$VERSION" "$CLIFF" "$COMMITS" "$STAT")"
            REQ="$(jq -n --arg m "$MODEL" --arg p "$PROMPT" '{model:$m, stream:false, temperature:0.3, messages:[{role:"user", content:$p}]}')"
            RESP="$(curl -sS --max-time 60 https://api.deepseek.com/chat/completions \
              -H "Authorization: Bearer ${DEEPSEEK_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$REQ" 2>/dev/null || true)"
            AI="$(printf '%s' "$RESP" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)"
            if [[ -n "$AI" ]]; then
              printf '%s\n' "$AI" > "$NOTES_FILE"
            else
              echo "::warning::DeepSeek polish unavailable; using git-cliff changelog"
            fi
          fi
          [[ -s "$NOTES_FILE" ]] || printf 'TokenBar %s\n' "$VERSION" > "$NOTES_FILE"
          echo "----- release notes -----"
          cat "$NOTES_FILE"

      - name: Sign and build appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          umask 077
          printf '%s' "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_ed.key
          scripts/make_appcast.sh "TokenBar-Beta.app.tar.gz" "$VERSION" "$BUILD" "$GITHUB_REF_NAME" /tmp/sparkle_ed.key release-notes.txt
          rm -f /tmp/sparkle_ed.key

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          case "$VERSION" in *-*) PRERELEASE_FLAG="--prerelease";; esac
          gh release create "$GITHUB_REF_NAME" \
            "TokenBar-Beta.app.tar.gz" \
            --title "TokenBar Native $VERSION" \
            --notes-file release-notes.txt $PRERELEASE_FLAG

      - name: Publish appcast to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add appcast.xml
          git commit -m "chore(release): appcast for $GITHUB_REF_NAME" || exit 0
          git push origin main

      - name: Bump Homebrew cask (tokenbar@beta)
        env:
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          umask 077
          printf '%s\n' "$HOMEBREW_TAP_DEPLOY_KEY" > /tmp/tap_deploy_key
          export GIT_SSH_COMMAND="ssh -i /tmp/tap_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          git clone git@github.com:Nanako0129/homebrew-tokenbar.git /tmp/tap
          cat > "/tmp/tap/Casks/tokenbar@beta.rb" <<CASK
          cask "tokenbar@beta" do
            version "$VERSION"
            sha256 "$SHA256"

            url "https://github.com/Nanako0129/TokenBar-Native/releases/download/v#{version}/TokenBar-Beta.app.tar.gz"
            name "TokenBar Beta"
            desc "Menubar dashboard for local AI token usage (native beta)"
            homepage "https://github.com/Nanako0129/TokenBar-Native"

            auto_updates true
            depends_on macos: ">= :sonoma"
            depends_on arch: :arm64

            app "TokenBar Beta.app"

            postflight do
              system_command "/usr/bin/xattr",
                args: ["-dr", "com.apple.quarantine", "#{appdir}/TokenBar Beta.app"]
            end

            zap trash: [
              "~/Library/Application Support/com.nyanako.tokenbar.beta",
              "~/Library/Caches/com.nyanako.tokenbar.beta",
              "~/Library/Preferences/com.nyanako.tokenbar.beta.plist",
            ]
          end
          CASK
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks
          git commit -m "tokenbar@beta $VERSION"
          git push
          rm -f /tmp/tap_deploy_key
