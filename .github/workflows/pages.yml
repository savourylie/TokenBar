name: Deploy landing page

# Builds the Astro site in landing/ and publishes it to GitHub Pages. Runs only
# when the landing site changes (or manually), independent of the app's CI and
# release pipelines.
on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: landing/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: landing
      - name: Build site
        run: npm run build
        working-directory: landing
        env:
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || 'https://tokenbar.nyanako.com' }}
      - uses: actions/configure-pages@v5
        with:
          # Enable Pages (build source = GitHub Actions) on first run if the repo
          # doesn't have it yet, using the pages:write permission above — avoids a
          # manual Settings toggle and the "Get Pages site failed (404)" error.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
