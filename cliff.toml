# git-cliff configuration — generates the per-release changelog that feeds both
# the GitHub Release body and the in-app updater (latest.json `notes`). Commits
# follow `type(scope): subject`; release/chore/ci noise is dropped.

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat=":") | last | trim | upper_first }}\
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "New" },
  { message = "^fix", group = "Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
  { message = "^test", skip = true },
  { message = "^style", skip = true },
]
